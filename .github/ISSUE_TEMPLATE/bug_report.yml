name: Bug report
description: Something broke
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - schema
        - plugin
        - app
        - docs
        - demo course
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS / bun version / Claude Code version
