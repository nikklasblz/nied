name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
        working-directory: schema
      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: schema
      - name: Validate fixture course
        run: bun run validate test/fixtures/valid-course
        working-directory: schema
      - name: JSON Schema is up to date
        run: |
          bun run gen:jsonschema
          git diff --exit-code json/
        working-directory: schema

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test src/lib/__test__
        working-directory: app
      - run: bunx tsc --noEmit
        working-directory: app
      - name: Build
        run: bun run build
        working-directory: app
        env:
          NIED_COURSES_ROOT: ${{ github.workspace }}/courses

  docs-parity:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: README pair check
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if echo "$CHANGED" | grep -q '^README\.md$'; then
            echo "$CHANGED" | grep -q '^README\.es\.md$' \
              || { echo "README.md changed without README.es.md"; exit 1; }
          fi
          if echo "$CHANGED" | grep -q '^README\.es\.md$'; then
            echo "$CHANGED" | grep -q '^README\.md$' \
              || { echo "README.es.md changed without README.md"; exit 1; }
          fi
      - name: Docs pair check
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          # Filter docs/*.md files, excluding docs/assets/
          DOCS=$(echo "$CHANGED" | grep -E '^docs/[^/]+\.md$' || true)
          if [ -z "$DOCS" ]; then
            exit 0
          fi
          FAIL=0
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            # Derive the pair: docs/foo.es.md <-> docs/foo.md
            if echo "$FILE" | grep -q '\.es\.md$'; then
              # This is a .es.md file; pair is the non-.es version
              PAIR=$(echo "$FILE" | sed 's/\.es\.md$/.md/')
            else
              # This is a plain .md file; pair is the .es version
              PAIR=$(echo "$FILE" | sed 's/\.md$/.es.md/')
            fi
            if ! echo "$DOCS" | grep -qF "$PAIR"; then
              echo "ERROR: '$FILE' changed but its pair '$PAIR' was not found in the diff."
              FAIL=1
            fi
          done <<< "$DOCS"
          exit $FAIL
